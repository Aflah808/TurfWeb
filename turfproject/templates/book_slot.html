{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Booking | Turf Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4A90E2;
            --success: #2ECC71;
            --error: #FF4757;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), 
                        url("{% static 'images/turfmain3.jpeg' %}") no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .booking-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        h2 {
            margin: 0 0 25px 0;
            font-weight: 700;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .input-group { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.8);
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 4px rgba(74, 144, 226, 0.2);
        }

        select option { background: #1e293b; }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: #357ABD;
            transform: translateY(-2px);
        }

        .error-msg {
            background: rgba(255, 71, 87, 0.15);
            color: var(--error);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid var(--error);
        }
    </style>
</head>
<body>

<div class="booking-card">
    <form method="POST">
        {% csrf_token %}
        <h2>Reserve Your Slot</h2>

        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}

        <div class="input-group">
            <label>Full Name</label>
            <input type="text" name="name" placeholder="John Doe" required>
        </div>

        <div class="input-group">
            <label>Contact Number</label>
            <input type="text" name="contact" placeholder="+91 XXXXX XXXXX" required>
        </div>

        <div class="input-group">
            <label>Available Slots</label>
            <select name="slot" required>
                <option value="" disabled selected>Select an available time</option>
                {% for slot in slots %}
                    <option value="{{ slot.id }}">{{ slot.date }} | {{ slot.time }}</option>
                {% empty %}
                    <option disabled>No slots available</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit">Confirm Booking</button>
    </form>
</div>

</body>
</html>
